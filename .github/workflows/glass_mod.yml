name: Build Insta Glass Ultra

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Apktool & Signer
        run: |
          wget https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O apktool.jar
          sudo mv apktool apktool.jar /usr/local/bin/
          sudo chmod +x /usr/local/bin/apktool
          sudo chmod +x /usr/local/bin/apktool.jar
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O signer.jar

      - name: Decompile APK
        run: apktool d instagram.apk -o Insta -f

      - name: Apply Ultra Glass Mod (Login, Nav, Buttons)
        run: |
          # 1. تفعيل الشفافية الشاملة على مستوى التطبيق
          sed -i '/<style name="Base.Theme.Instagram"/a \        <item name="android:windowBackground">@android:color/transparent</item>\n        <item name="android:windowIsTranslucent">true</item>' Insta/res/values/styles.xml

          # 2. الوضع العادي (زجاج فاتح للخلفيات والأزرار والتنقل)
          sed -i -E 's/<color name="igds_primary_background">[^<]+<\/color>/<color name="igds_primary_background">#66ffffff<\/color>/g' Insta/res/values/colors.xml
          sed -i -E 's/<color name="igds_secondary_background">[^<]+<\/color>/<color name="igds_secondary_background">#40ffffff<\/color>/g' Insta/res/values/colors.xml
          sed -i -E 's/<color name="igds_elevated_background">[^<]+<\/color>/<color name="igds_elevated_background">#4dffffff<\/color>/g' Insta/res/values/colors.xml
          sed -i -E 's/<color name="button_background">[^<]+<\/color>/<color name="button_background">#33ffffff<\/color>/g' Insta/res/values/colors.xml
          sed -i -E 's/<color name="igds_primary_button">[^<]+<\/color>/<color name="igds_primary_button">#4dffffff<\/color>/g' Insta/res/values/colors.xml
          sed -i -E 's/<color name="bottom_sheet_background">[^<]+<\/color>/<color name="bottom_sheet_background">#4dffffff<\/color>/g' Insta/res/values/colors.xml

          # 3. الوضع الليلي (زجاج داكن أنيق للخلفيات والأزرار والتنقل)
          sed -i -E 's/<color name="igds_primary_background">[^<]+<\/color>/<color name="igds_primary_background">#66000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="igds_secondary_background">[^<]+<\/color>/<color name="igds_secondary_background">#40000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="igds_elevated_background">[^<]+<\/color>/<color name="igds_elevated_background">#4d000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="button_background">[^<]+<\/color>/<color name="button_background">#33000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="igds_primary_button">[^<]+<\/color>/<color name="igds_primary_button">#4d000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="bottom_sheet_background">[^<]+<\/color>/<color name="bottom_sheet_background">#4d000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="ig_splash_screen_background">[^<]+<\/color>/<color name="ig_splash_screen_background">#00000000<\/color>/g' Insta/res/values-night/colors.xml

      - name: Fix Anti-Mod Traps ($, layouts.xml)
        run: |
          find Insta/res -type f -name "\$*" | while read file; do dir=$(dirname "$file"); base=$(basename "$file"); newbase=$(echo "$base" | tr '$' '_'); mv "$file" "$dir/$newbase"; done
          find Insta/res -type f -name "*.xml" -exec sed -i 's/@drawable\/\$/@drawable\/_/g' {} +
          find Insta/res -name "layouts.xml" -type f -delete

      - name: Build APK
        run: apktool b Insta -o InstaGlass_Unsigned.apk

      - name: Sign APK
        run: java -jar signer.jar -a InstaGlass_Unsigned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Instagram_Glass_Ultra
          path: '*-aligned-debugSigned.apk'
