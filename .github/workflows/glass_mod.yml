name: Build Insta Glass 2026 - Ultimate Precision

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo (LFS Support)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Tools via GitHub CLI (Modern 2026 Way)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # استخدام gh CLI لضمان تحميل الأداة مهما كان اسمها
          gh release download --repo REAndroid/APKEditor --pattern "APKEditor*.jar" --output apkeditor.jar
          gh release download --repo patrickfav/uber-apk-signer --pattern "*.jar" --output signer.jar

      - name: 🔓 Professional Decode
        run: java -jar apkeditor.jar d -i instagram.apk -o Insta_Dir

      - name: 💎 Millimeter Precision Glass Mod (The Ultimate Polish)
        run: |
          echo "حقن التصميم الزجاجي المتطور..."
          
          # 1. الشفافية الكاملة وتفعيل رؤية ورق حائط الموبايل (Wallpaper)
          find Insta_Dir/res -name "styles.xml" -exec sed -i '/<style name="Base.Theme.Instagram"/a \        <item name="android:windowBackground">@android:color/transparent</item>\n        <item name="android:windowIsTranslucent">true</item>\n        <item name="android:windowShowWallpaper">true</item>' {} +

          # 2. تحويل كل مليمتر في الألوان لزجاج (Light Mode)
          # استهداف الخلفيات، أزرار تسجيل الدخول، وشريط التنقل
          find Insta_Dir/res -name "colors.xml" -exec sed -i -E 's/name="igds_primary_background">[^<]+/name="igds_primary_background">#66ffffff/g' {} +
          find Insta_Dir/res -name "colors.xml" -exec sed -i -E 's/name="igds_secondary_background">[^<]+/name="igds_secondary_background">#33ffffff/g' {} +
          find Insta_Dir/res -name "colors.xml" -exec sed -i -E 's/name="button_background">[^<]+/name="button_background">#4dffffff/g' {} +
          find Insta_Dir/res -name "colors.xml" -exec sed -i -E 's/name="igds_primary_button">[^<]+/name="igds_primary_button">#4dffffff/g' {} +
          find Insta_Dir/res -name "colors.xml" -exec sed -i -E 's/name="igds_tab_bar_background">[^<]+/name="igds_tab_bar_background">#26ffffff/g' {} +
          
          # 3. تعديل الوضع الليلي (Dark Deep Glass)
          if [ -d Insta_Dir/res/values-night ]; then
            find Insta_Dir/res/values-night -name "colors.xml" -exec sed -i -E 's/name="igds_primary_background">[^<]+/name="igds_primary_background">#80000000/g' {} +
            find Insta_Dir/res/values-night -name "colors.xml" -exec sed -i -E 's/name="igds_secondary_background">[^<]+/name="igds_secondary_background">#4d000000/g' {} +
            find Insta_Dir/res/values-night -name "colors.xml" -exec sed -i -E 's/name="ig_splash_screen_background">[^<]+/name="ig_splash_screen_background">#00000000/g' {} +
          fi

      - name: 🛡️ Anti-Trap Cleaning (Self-Healing)
        run: |
          # حذف أي فخاخ برمجية من إنستجرام
          find Insta_Dir/res -name "layouts.xml" -delete
          find Insta_Dir/res -type f -name "*.xml" -exec sed -i 's/\$//g' {} +

      - name: 🏗️ Atomic Build (REAndroid Engine)
        run: java -jar apkeditor.jar b -i Insta_Dir -o InstaGlass_2026.apk

      - name: ✍️ Professional Sign
        run: java -jar signer.jar -a InstaGlass_2026.apk

      - name: 📤 Deliver
        uses: actions/upload-artifact@v4
        with:
          name: Instagram_Ultra_Glass_Final
          path: '*-aligned-debugSigned.apk'
