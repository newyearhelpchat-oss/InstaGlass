name: Build Insta Glass Ultra 2026 - Tactical Edition

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Tools
        run: |
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          sudo cp apktool.jar /usr/local/bin/apktool.jar
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O signer.jar

      - name: 🚀 Tactical Decompile (Fast & Safe)
        # هنا السر: بنفك الـ Resources فقط وبنسيب الأكواد والمجلدات المعقدة مقفولة
        run: java -jar apktool.jar d instagram.apk -o Insta -f -r

      - name: ✨ Inject Glass UI (Targeted)
        run: |
          echo "حقن الشفافية والزجاج..."
          # 1. تفعيل الشفافية في النظام
          sed -i '/<style name="Base.Theme.Instagram"/a \        <item name="android:windowBackground">@android:color/transparent</item>\n        <item name="android:windowIsTranslucent">true</item>' Insta/res/values/styles.xml

          # 2. تحويل الخلفيات لزجاج (Light Mode)
          sed -i -E 's/name="igds_primary_background">#ffffffff/name="igds_primary_background">#80ffffff/g' Insta/res/values/colors.xml
          sed -i -E 's/name="igds_secondary_background">[^<]+/name="igds_secondary_background">#40ffffff/g' Insta/res/values/colors.xml
          sed -i -E 's/name="button_background">[^<]+/name="button_background">#33ffffff/g' Insta/res/values/colors.xml

          # 3. تحويل الخلفيات لزجاج (Night Mode)
          if [ -f Insta/res/values-night/colors.xml ]; then
            sed -i -E 's/name="igds_primary_background">[^<]+/name="igds_primary_background">#80000000/g' Insta/res/values-night/colors.xml
            sed -i -E 's/name="igds_secondary_background">[^<]+/name="igds_secondary_background">#40000000/g' Insta/res/values-night/colors.xml
          fi

      - name: 🛠️ Force Rebuild (No Traps)
        # هنا بنبني مع تجاهل الأخطاء البسيطة في الموارد غير المستخدمة
        run: java -jar apktool.jar b Insta -o InstaGlass_Unsigned.apk --use-aapt2

      - name: ✍️ Final Sign
        run: java -jar signer.jar -a InstaGlass_Unsigned.apk

      - name: 📤 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Instagram_Glass_2026_Ready
          path: '*-aligned-debugSigned.apk'
