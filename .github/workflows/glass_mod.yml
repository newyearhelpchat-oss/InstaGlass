name: Build Insta Glass Ultra 2026 - Master Edition

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Advanced Build Tools
        run: |
          wget https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          sudo mv apktool apktool.jar /usr/local/bin/
          sudo chmod +x /usr/local/bin/apktool
          sudo chmod +x /usr/local/bin/apktool.jar
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O signer.jar

      - name: Decompile APK
        run: apktool d instagram.apk -o Insta -f

      - name: 🛡️ Auto-Correction & Deep Clean
        run: |
          echo "جاري تطهير التطبيق من الفخاخ البرمجية..."
          
          # 1. حذف ملفات layouts.xml الوهمية اللي بتعطل الـ Compile
          find Insta/res -name "layouts.xml" -type f -delete
          
          # 2. معالجة أزمة علامة الـ $ في الملفات (مسحها نهائياً)
          find Insta/res -type f -name "\$*" | while read file; do 
            mv "$file" "$(echo "$file" | tr -d '$')"
          done
          
          # 3. تصحيح استدعاءات الـ XML لتتطابق مع الأسماء الجديدة بدون $
          find Insta/res -type f -name "*.xml" -exec sed -i 's/@drawable\/\$/@drawable\//g' {} +
          find Insta/res/values -type f -name "*.xml" -exec sed -i 's/name="\$/name="/g' {} +
          
          # 4. تنظيف ملف public.xml من أي مراجع وهمية أو مكسورة
          sed -i '/name="\$[^"]*"/d' Insta/res/values/public.xml
          
          echo "تم تنظيف حقل الألغام بنجاح!"

      - name: ✨ Apply Ultra Glass Mod (UI/UX)
        run: |
          # جعل نافذة التطبيق شفافة بالكامل
          sed -i '/<style name="Base.Theme.Instagram"/a \        <item name="android:windowBackground">@android:color/transparent</item>\n        <item name="android:windowIsTranslucent">true</item>' Insta/res/values/styles.xml

          # تعديل ألوان IGDS (الخلفيات، الأزرار، الكروت) لشفافية 2026
          # الوضع الفاتح
          sed -i -E 's/<color name="igds_primary_background">[^<]+<\/color>/<color name="igds_primary_background">#80ffffff<\/color>/g' Insta/res/values/colors.xml
          sed -i -E 's/<color name="igds_secondary_background">[^<]+<\/color>/<color name="igds_secondary_background">#40ffffff<\/color>/g' Insta/res/values/colors.xml
          sed -i -E 's/<color name="igds_elevated_background">[^<]+<\/color>/<color name="igds_elevated_background">#b3ffffff<\/color>/g' Insta/res/values/colors.xml
          sed -i -E 's/<color name="button_background">[^<]+<\/color>/<color name="button_background">#33ffffff<\/color>/g' Insta/res/values/colors.xml
          
          # الوضع الليلي
          sed -i -E 's/<color name="igds_primary_background">[^<]+<\/color>/<color name="igds_primary_background">#80000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="igds_secondary_background">[^<]+<\/color>/<color name="igds_secondary_background">#40000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="igds_elevated_background">[^<]+<\/color>/<color name="igds_elevated_background">#b3000000<\/color>/g' Insta/res/values-night/colors.xml
          sed -i -E 's/<color name="ig_splash_screen_background">[^<]+<\/color>/<color name="ig_splash_screen_background">#00000000<\/color>/g' Insta/res/values-night/colors.xml

      - name: Build APK (Self-Healing Mode)
        run: apktool b Insta -o InstaGlass_Unsigned.apk --use-aapt2

      - name: Sign & Align APK
        run: java -jar signer.jar -a InstaGlass_Unsigned.apk

      - name: Upload Final Glass APK
        uses: actions/upload-artifact@v4
        with:
          name: Instagram_Glass_2026_Final
          path: '*-aligned-debugSigned.apk'
